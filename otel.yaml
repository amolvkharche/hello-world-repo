command:
  name: otelcol-k8s
mode: deployment
replicaCount: 1

image:
  repository: ghcr.io/open-telemetry/opentelemetry-collector-releases/opentelemetry-collector-k8s

# Inject the API key secret as an environment variable
extraEnvsFrom:
  - secretRef:
      name: open-telemetry-collector

# Enable the k8sattributes preset to enrich metrics with pod/namespace metadata
presets:
  kubernetesAttributes:
    enabled: true
    extractAllPodLabels: true

resources:
  limits:
    cpu: 250m
    memory: 512Mi

# Disable ports not needed for this setup
ports:
  jaeger-compact:
    enabled: false
  jaeger-thrift:
    enabled: false
  jaeger-grpc:
    enabled: false
  zipkin:
    enabled: false
  otlp:
    enabled: true
    containerPort: 4317
    servicePort: 4317
    appProtocol: grpc
  otlp-http:
    enabled: true
    containerPort: 4318
    servicePort: 4318
  metrics:
    enabled: true
    containerPort: 8888
    servicePort: 8888

config:
  extensions:
    bearertokenauth:
      scheme: SUSEObservability
      token: ${env:API_KEY}
    health_check:
      endpoint: ${env:MY_POD_IP}:13133

  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

    prometheus:
      config:
        scrape_configs:
          # Scrape the collector's own internal metrics
          - job_name: opentelemetry-collector
            scrape_interval: 10s
            static_configs:
              - targets:
                  - ${env:MY_POD_IP}:8888

          # Scrape GPU metrics from NVIDIA DCGM Exporter
          - job_name: gpu-metrics
            scrape_interval: 10s
            scheme: http
            kubernetes_sd_configs:
              - role: endpoints
                namespaces:
                  names:
                    - gpu-operator

  processors:
    memory_limiter:
      check_interval: 5s
      limit_percentage: 80
      spike_limit_percentage: 25

    k8sattributes:
      passthrough: false
      extract:
        metadata:
          - k8s.namespace.name
          - k8s.pod.name
          - k8s.pod.uid
          - k8s.node.name
          - k8s.pod.start_time
          - k8s.deployment.name
          - k8s.replicaset.name
          - k8s.container.name
          - container.image.name
          - container.image.tag
          - k8s.cluster.uid
          - service.namespace
          - service.name
          - service.instance.id
        labels:
          - from: pod
            key_regex: (.*)
            tag_name: $$1
        otel_annotations: true
      pod_association:
        - sources:
            - from: resource_attribute
              name: k8s.pod.ip
        - sources:
            - from: resource_attribute
              name: k8s.pod.uid
        - sources:
            - from: connection

    resource:
      attributes:
        - action: upsert
          key: k8s.cluster.name
          value: suse-ai-server
        - action: insert
          from_attribute: k8s.pod.uid
          key: service.instance.id
        - action: insert
          from_attribute: k8s.namespace.name
          key: service.namespace

    batch: {}

  exporters:
    debug: {}
    otlphttp/suse-observability:
      auth:
        authenticator: bearertokenauth
      compression: snappy
      endpoint: https://otlp-http-observability.rajesh-kumar.in

  connectors:
    spanmetrics:
      metrics_expiration: 5m
      namespace: otel_span

  service:
    extensions:
      - health_check
      - bearertokenauth
    pipelines:
      metrics:
        receivers:
          - otlp
          - prometheus
          - spanmetrics
        processors:
          - k8sattributes
          - memory_limiter
          - resource
          - batch
        exporters:
          - debug
          - otlphttp/suse-observability
      traces:
        receivers:
          - otlp
        processors:
          - k8sattributes
          - memory_limiter
          - resource
          - batch
        exporters:
          - debug
          - spanmetrics
          - otlphttp/suse-observability
      logs:
        receivers:
          - otlp
        processors:
          - k8sattributes
        exporters:
          - debug
    telemetry:
      metrics:
        readers:
          - pull:
              exporter:
                prometheus:
                  host: ${env:MY_POD_IP}
                  port: 8888
